<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">

        <div class="logo">🛒 ShopEase</div>

        <ul class="menu">
            <li class="active"><i class="bi bi-grid-fill"></i> Dashboard</li>
            <li><i class="bi bi-box-seam"></i> Products</li>
            <li><i class="bi bi-plus-circle"></i> Add Product</li>
            <li><i class="bi bi-people"></i> Customers</li>
            <li><i class="bi bi-bar-chart"></i> Analytics</li>
            <li onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</li>
        </ul>

    </div>

    <div class="main-content">

        <div class="header">

            <div>
                <h1>Welcome Back 👋</h1>
                <p>Manage your ShopEase Store</p>

                <p id="currentDate"></p>

                <p id="currentTime"></p>
            </div>

            <div class="profile">
                <div class="profile-circle">A</div>
                <div>
                    <h3 id="userEmail"></h3>
                    <span>Administrator</span>
                </div>
            </div>

        </div>

        <div class="cards">

            <div class="card">
                <i class="bi bi-box-seam"></i>
                <h2 id="productCount">0</h2>
                <p>Products</p>
            </div>

            <div class="card">
                <i class="bi bi-cart-check"></i>
                <h2>12</h2>
                <p>Orders</p>
            </div>

            <div class="card">
                <i class="bi bi-people-fill"></i>
                <h2>150</h2>
                <p>Customers</p>
            </div>

            <div class="card">
                <i class="bi bi-currency-rupee"></i>
                <h2>₹85K</h2>
                <p>Revenue</p>
            </div>

        </div>

        <div class="quick-actions">

            <h2>Quick Actions</h2>

            <div class="buttons">
                <a href="products.html" class="action-btn">Add Product</a>
                <a href="products.html" class="action-btn">View Products</a>
            </div>

        </div>



    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
