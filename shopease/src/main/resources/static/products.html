<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | ShopEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>

<div class="container">

    <div class="header">

        <h1>📦 Products</h1>

        <div>

            <input type="text" id="search" placeholder="Search Product" class="search-box">

            <button class="add-button" onclick="openModal()">
                <i class="bi bi-plus-circle"></i>
                Add Product
            </button>

        </div>

    </div>

    <div id="productContainer" class="product-container">

    </div>

</div>

<div id="productModal" class="modal">

    <div class="modal-content">

        <h2>Add Product</h2>

        <input type="text" id="productName" placeholder="Product Name">

        <textarea id="description" placeholder="Description"></textarea>

        <input type="number" id="price" placeholder="Price">

        <input type="number" id="quantity" placeholder="Quantity">

        <div class="button-group">

            <button onclick="saveProduct()" class="save-button">
                Save
            </button>

            <button onclick="closeModal()" class="cancel-button">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="js/products.js"></script>

</body>
</html>
