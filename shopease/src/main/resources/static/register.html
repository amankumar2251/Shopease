<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ShopEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="register-container">

    <div class="register-card">

        <h1 class="register-title">ShopEase</h1>

        <p class="register-subtitle">Create Your Account</p>

        <input type="text" id="name" class="input-box" placeholder="Full Name">

        <input type="text" id="phoneNumber" class="input-box" placeholder="Phone Number">

        <input type="email" id="email" class="input-box" placeholder="Email">

        <input type="password" id="password" class="input-box" placeholder="Password">

        <button class="register-btn" onclick="register()">
            Register
        </button>

        <p id="message" class="message"></p>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
